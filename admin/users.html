<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des utilisateurs - Paname Service Admin</title>
    
    <!-- ============================================================ -->
    <!-- === BIBLIOTHÈQUES CORRIGÉES === -->
    <!-- ============================================================ -->

    <!-- 1. FONT AWESOME 6 (version gratuite stable) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- 2. GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- 3. JQUERY (AJOUTÉ pour compatibilité) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
        }
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar améliorée --- */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            color: white;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .sidebar-header img {
            height: 45px;
            margin-bottom: 0.5rem;
        }
        .sidebar-header h3 {
            color: #D4AF37;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .sidebar-menu {
            padding: 1rem 0;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.5rem;
            color: #e9ecef;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
        }
        .menu-item:hover,
        .menu-item.active {
            background: rgba(212, 175, 55, 0.1);
            border-left-color: #D4AF37;
            color: #D4AF37;
        }
        .menu-item i {
            width: 24px;
            font-size: 1.1rem;
            text-align: center;
        }
        .sidebar-divider {
            margin: 1rem;
            border-color: rgba(255, 255, 255, 0.08);
        }
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 1rem;
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            padding: 1.5rem 2rem;
            overflow-x: auto;
        }

        /* --- Header --- */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .page-header h1 i {
            color: #D4AF37;
        }

        /* --- Boutons --- */
        .btn {
            padding: 0.6rem 1.2rem;
            background: #D4AF37;
            color: #1a1a1a;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #c5a032;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
        }
        .btn-outline:hover {
            background: #D4AF37;
            color: #1a1a1a;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }

        /* --- Filtres --- */
        .filters {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .filters input,
        .filters select {
            padding: 0.5rem 1rem;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            flex: 1;
            min-width: 150px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: #f8f9fa;
            transition: border 0.2s;
        }
        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #D4AF37;
            background: white;
        }

        /* --- Stats --- */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: white;
            padding: 1.2rem;
            border-radius: 0.75rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #D4AF37;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 0.2rem;
        }

        /* --- Table --- */
        .users-table {
            background: white;
            border-radius: 0.75rem;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        th,
        td {
            padding: 0.9rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #495057;
        }
        tr:hover td {
            background: #fafafa;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D4AF37;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .role-badge {
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            background: #d1e7dd;
            color: #0f5132;
        }
        .role-admin {
            background: #cfe2ff;
            color: #084298;
        }
        .status-badge {
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-active {
            background: #d1e7dd;
            color: #0f5132;
        }
        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }
        .action-buttons {
            display: flex;
            gap: 0.3rem;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.4rem 0.5rem;
            border-radius: 0.3rem;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: #f1f3f5;
        }
        .action-btn.edit {
            color: #D4AF37;
        }
        .action-btn.delete {
            color: #dc3545;
        }
        .action-btn.block {
            color: #ffc107;
        }
        .action-btn.unblock {
            color: #28a745;
        }

        /* --- Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 0.75rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #D4AF37;
        }
        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c757d;
            transition: color 0.2s;
        }
        .modal-header .close-btn:hover {
            color: #1a1a1a;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #495057;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #D4AF37;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e9ecef;
        }

        /* --- Notification --- */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .notification {
            background: white;
            padding: 0.8rem 1.2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            border-left: 4px solid;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 280px;
            max-width: 400px;
        }
        .notification.show {
            transform: translateX(0);
        }
        .notification-success {
            border-left-color: #28a745;
        }
        .notification-success i {
            color: #28a745;
        }
        .notification-error {
            border-left-color: #dc3545;
        }
        .notification-error i {
            color: #dc3545;
        }
        .notification button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: auto;
            color: #6c757d;
        }
        .notification button:hover {
            color: #1a1a1a;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                transition: left 0.3s ease;
            }
            .sidebar.open {
                left: 0;
            }
            .main-content {
                padding: 1rem;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .page-header h1 {
                font-size: 1.2rem;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters input,
            .filters select {
                min-width: unset;
            }
        }
        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }

        /* --- Mobile menu toggle --- */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #1a1a1a;
            cursor: pointer;
            padding: 0.5rem;
        }
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }
        .overlay.active {
            display: block;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }
        .loading i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
            color: #D4AF37;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Overlay mobile -->
        <div class="overlay" id="overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../assets/logoPANSERV.png" alt="Logo" style="height:45px;">
                <h3>Paname Admin</h3>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="products.html" class="menu-item"><i class="fas fa-box"></i> Produits</a>
                <a href="orders.html" class="menu-item"><i class="fas fa-shopping-cart"></i> Commandes</a>
                <a href="users.html" class="menu-item active"><i class="fas fa-users"></i> Utilisateurs</a>
                <a href="invoices.html" class="menu-item"><i class="fas fa-file-invoice"></i> Factures</a>
                <a href="stats.html" class="menu-item"><i class="fas fa-chart-bar"></i> Statistiques</a>
                <hr class="sidebar-divider">
                <a href="../index.html" class="menu-item"><i class="fas fa-home"></i> Retour au site</a>
                <a href="#" class="menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </nav>
            <div class="sidebar-footer">
                <div style="font-size:0.7rem;color:#6c757d;text-align:center;">v2.0.0</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header avec menu toggle mobile -->
            <div class="page-header">
                <div style="display:flex;align-items:center;gap:1rem;">
                    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1><i class="fas fa-users"></i> Gestion des utilisateurs</h1>
                </div>
                <button class="btn" id="addUserBtn"><i class="fas fa-plus"></i> Nouvel utilisateur</button>
            </div>

            <!-- Filtres -->
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Rechercher par nom, email...">
                <select id="roleFilter">
                    <option value="">Tous les rôles</option>
                    <option value="user">Utilisateur</option>
                    <option value="admin">Administrateur</option>
                </select>
                <select id="statusFilter">
                    <option value="">Tous les statuts</option>
                    <option value="active">Actif</option>
                    <option value="inactive">Inactif</option>
                </select>
                <button class="btn btn-outline" id="resetFiltersBtn"><i class="fas fa-undo"></i> Réinitialiser</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-card"><div class="number" id="totalUsers">0</div><div class="label">Total utilisateurs</div></div>
                <div class="stat-card"><div class="number" id="activeUsers">0</div><div class="label">Actifs</div></div>
                <div class="stat-card"><div class="number" id="adminUsers">0</div><div class="label">Administrateurs</div></div>
                <div class="stat-card"><div class="number" id="newUsersMonth">0</div><div class="label">Nouveaux (30j)</div></div>
            </div>

            <!-- Table -->
            <div class="users-table">
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Rôle</th>
                            <th>Statut</th>
                            <th>Inscrit le</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Les utilisateurs seront chargés dynamiquement -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Ajouter un utilisateur</h3>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>Nom complet *</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="userEmail" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="userPhone">
                </div>
                <div class="form-group">
                    <label>Rôle</label>
                    <select id="userRole">
                        <option value="user">Utilisateur</option>
                        <option value="admin">Administrateur</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Statut</label>
                    <select id="userStatus">
                        <option value="active">Actif</option>
                        <option value="inactive">Inactif</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="userPassword" placeholder="Laisser vide pour conserver">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notifications -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- ============================================================ -->
    <!-- === SCRIPTS CORRIGÉS === -->
    <!-- ============================================================ -->

    <script>
        // ========== Données ==========
        let users = [
            { id: 1, name: 'Admin Paname', email: 'admin@lepaname.com', phone: '657715482', role: 'admin', status: 'active',
                createdAt: '2025-01-01', avatar: 'A' },
            { id: 2, name: 'Jean Dupont', email: 'jean@email.com', phone: '698765432', role: 'user', status: 'active',
                createdAt: '2025-01-10', avatar: 'J' },
            { id: 3, name: 'Marie Claire', email: 'marie@email.com', phone: '612345678', role: 'user', status: 'active',
                createdAt: '2025-01-12', avatar: 'M' },
            { id: 4, name: 'Paul K.', email: 'paul@email.com', phone: '676391816', role: 'user', status: 'inactive',
                createdAt: '2025-01-05', avatar: 'P' },
            { id: 5, name: 'Sophie L.', email: 'sophie@email.com', phone: '623456789', role: 'user', status: 'active',
                createdAt: '2025-01-20', avatar: 'S' }
        ];

        // ========== Notifications ==========
        function showNotification(msg, type) {
            const container = document.getElementById('notificationContainer');
            const notif = document.createElement('div');
            notif.className = `notification notification-${type}`;
            notif.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${msg}</span>
                <button onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 300);
            }, 3500);
        }

        // ========== Rendu ==========
        function renderUsers() {
            const tbody = document.getElementById('usersTableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;

            let filtered = users.filter(u => {
                const matchSearch = u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search);
                const matchRole = !role || u.role === role;
                const matchStatus = !status || u.status === status;
                return matchSearch && matchRole && matchStatus;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center;padding:2rem;color:#6c757d;">
                            <i class="fas fa-users" style="font-size:2rem;display:block;margin-bottom:0.5rem;opacity:0.3;"></i>
                            Aucun utilisateur trouvé
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = filtered.map(u => `
                    <tr>
                        <td><div class="user-avatar">${u.avatar}</div></td>
                        <td><strong>${u.name}</strong></td>
                        <td>${u.email}</td>
                        <td>${u.phone || '-'}</td>
                        <td><span class="role-badge ${u.role === 'admin' ? 'role-admin' : ''}">${u.role === 'admin' ? 'Admin' : 'Utilisateur'}</span></td>
                        <td><span class="status-badge ${u.status === 'active' ? 'status-active' : 'status-inactive'}">${u.status === 'active' ? 'Actif' : 'Inactif'}</span></td>
                        <td>${u.createdAt}</td>
                        <td class="action-buttons">
                            <button class="action-btn edit" onclick="editUser(${u.id})" title="Modifier"><i class="fas fa-edit"></i></button>
                            <button class="action-btn ${u.status === 'active' ? 'block' : 'unblock'}" onclick="toggleUserStatus(${u.id})" title="${u.status === 'active' ? 'Désactiver' : 'Activer'}">
                                <i class="fas fa-${u.status === 'active' ? 'ban' : 'check-circle'}"></i>
                            </button>
                            <button class="action-btn delete" onclick="deleteUser(${u.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalUsers').innerHTML = users.length;
            document.getElementById('activeUsers').innerHTML = users.filter(u => u.status === 'active').length;
            document.getElementById('adminUsers').innerHTML = users.filter(u => u.role === 'admin').length;
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            document.getElementById('newUsersMonth').innerHTML = users.filter(u => new Date(u.createdAt) >= thirtyDaysAgo)
                .length;
        }

        // ========== CRUD ==========
        function editUser(id) {
            const u = users.find(u => u.id === id);
            if (!u) return;
            document.getElementById('modalTitle').innerHTML = 'Modifier l\'utilisateur';
            document.getElementById('userId').value = u.id;
            document.getElementById('userName').value = u.name;
            document.getElementById('userEmail').value = u.email;
            document.getElementById('userPhone').value = u.phone || '';
            document.getElementById('userRole').value = u.role;
            document.getElementById('userStatus').value = u.status;
            document.getElementById('userPassword').value = '';
            document.getElementById('userModal').classList.add('active');
        }

        function deleteUser(id) {
            if (confirm('Supprimer définitivement cet utilisateur ?')) {
                users = users.filter(u => u.id !== id);
                renderUsers();
                showNotification('Utilisateur supprimé', 'success');
            }
        }

        function toggleUserStatus(id) {
            const u = users.find(u => u.id === id);
            if (!u) return;
            u.status = u.status === 'active' ? 'inactive' : 'active';
            renderUsers();
            showNotification(`Utilisateur ${u.status === 'active' ? 'activé' : 'désactivé'}`, 'success');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        // ========== Formulaire ==========
        document.getElementById('userForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('userId').value);
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const role = document.getElementById('userRole').value;
            const status = document.getElementById('userStatus').value;
            const password = document.getElementById('userPassword').value;

            if (!name || !email) {
                showNotification('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }

            const userData = {
                id: id || Date.now(),
                name,
                email,
                phone,
                role,
                status,
                createdAt: id ? users.find(u => u.id === id).createdAt : new Date().toISOString().split('T')[0],
                avatar: name.charAt(0).toUpperCase()
            };

            if (id) {
                const index = users.findIndex(u => u.id === id);
                users[index] = { ...users[index], ...userData };
                showNotification('Utilisateur modifié avec succès', 'success');
            } else {
                users.unshift(userData);
                showNotification('Utilisateur ajouté avec succès', 'success');
            }
            closeModal();
            renderUsers();
        });

        // ========== Événements ==========
        document.getElementById('addUserBtn').addEventListener('click', () => {
            document.getElementById('modalTitle').innerHTML = 'Ajouter un utilisateur';
            document.getElementById('userId').value = '';
            document.getElementById('userForm').reset();
            document.getElementById('userModal').classList.add('active');
        });

        document.getElementById('resetFiltersBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            renderUsers();
        });

        document.getElementById('searchInput').addEventListener('input', renderUsers);
        document.getElementById('roleFilter').addEventListener('change', renderUsers);
        document.getElementById('statusFilter').addEventListener('change', renderUsers);

        // ========== Menu Mobile ==========
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        menuToggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // Fermer le menu sur les liens (mobile)
        document.querySelectorAll('.menu-item').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                }
            });
        });

        // ========== Auth & Logout ==========
        function checkAdmin() {
            const isAdmin = localStorage.getItem('paname_admin_session');
            if (!isAdmin) {
                window.location.href = '../index.html';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('paname_admin_session');
            window.location.href = '../index.html';
        });

        // ========== Initialisation ==========
        renderUsers();
        checkAdmin();
        console.log('👥 Admin Users - Gestion des utilisateurs v2');
        console.log('📄 Nouvelle section "Factures" ajoutée au menu');
        console.log('✅ Bibliothèques corrigées: Font Awesome 6.4.2, jQuery 3.7.1');
    </script>
</body>
</html>
